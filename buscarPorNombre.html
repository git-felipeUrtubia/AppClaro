<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="src/css/index.css">
    <link rel="stylesheet" href="src/css/registro_visitas.css">
    <link rel="stylesheet" href="src/css/menu_desplegable.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!---------------- MENU DESPLEGABLE ---------------->

    <div class="menu-desplegable">

        <div class="btn-cerrar-mnu-desplegable" >
            <span>Claro Chile — Av. Salto #100</span>
            <button id="btn-cerrar-menu"><img class="icono-mnu-desplegable" src="/src/icon/close-outline.svg" alt=""></button>
        </div>

        <hr>
        
        <div class="btn-mnu-desplegable" >
            <button id="btn-guardar-mnu-desplegable"><span>Guardar</span>
                <img class="icono-mnu-desplegable" src="/src/icon/chevron-forward-outline.svg" alt="">
            </button>
        </div>

        <div class="btn-mnu-desplegable">
            <button id="btn-buscar-por-nombre-mnu-desplegable"><span>Buscar por nombre </span>
                <img class="icono-mnu-desplegable" src="/src/icon/chevron-forward-outline.svg" alt="">
            </button>
        </div>

        <div class="btn-mnu-desplegable">
            <button id="btn-buscar-por-rut-mnu-desplegable"><span>Buscar por rut </span>
                <img class="icono-mnu-desplegable" src="/src/icon/chevron-forward-outline.svg" alt="">
            </button>
        </div>

        <div class="btn-mnu-desplegable">
            <button id="btn-listar-por-empresa-mnu-desplegable"><span>Listar por empresa </span>
                <img class="icono-mnu-desplegable" src="/src/icon/chevron-forward-outline.svg" alt="">
            </button>
        </div>

        <div class="btn-mnu-desplegable">
            <button id="btn-mostrar-todo-mnu-desplegable"><span>Mostrar todo</span>
                <img class="icono-mnu-desplegable" src="/src/icon/chevron-forward-outline.svg" alt="">
            </button>
        </div>
        
        <hr>
    </div>

    <!---------------- LOGO CLARO ---------------->

    <div class="contain-logo-claro">
        <img src="/src/img/logo_claro.png" alt="Logo Claro" width="150px">
    </div>

    <!---------------- BTN MENU DESPLEGABLE ---------------->
    <div class="contenedor-menu">
        <button id="btn-menu" class="btn-menu-desplegable" ><img class="icono-menu" src="/src/icon/reorder-four-outline.svg" alt=""></button>
    </div>

    <div class="contain-main">

        <!---------------- FORMULARIO DE ENTRADA ---------------->

        <div class="contain-data">

            <h3>Buscar por nombre</h3>

            <div class="formulario">
                
                <div class="fila"> 
                    <label>Nombre</label>
                    <input id="input-nombre" type="text" required="true">
                </div>
                <div class="fila"> 
                    <label>Apellido</label>
                    <input id="input-apellido" type="text" required="true">
                </div>
                
            </div>
            <div class="d-grid gap-2 d-md-block">
                <button id="btn-buscar-nombre" class="btn btn-primary" type="button">Buscar</button>
            </div>

        </div>

        <!---------------- TABLA DE DATOS ---------------->


        <div class="contain-table">
            <table id="tabla-usuarios" class="table table-striped text-center">
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Rut</th>
                        <th>Empresa</th>
                        <th>Entrada</th>
                        <th>Salida</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Se insertarán filas desde JS -->

                </tbody>
            </table>
        </div>
    </div>
</body>
<script src="/src/js/mnu_desplegable.js"></script>
<script src="src/js/buscarPorNombre.js"></script>
</html>
